services:
  db:
    image: postgres:16-alpine
    container_name: monai-db
    environment:
      POSTGRES_USER: monai
      POSTGRES_PASSWORD: monai
      POSTGRES_DB: monai
    ports:
      - "5434:5432"
    volumes:
      - monai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: monai-backend
    # Host networking: reaches the host's Ollama daemon (127.0.0.1:11434) and the
    # db's published port (127.0.0.1:5434) directly. Avoids forcing Ollama to
    # rebind to 0.0.0.0. Linux-only; on Mac/Windows switch to bridge + host.docker.internal.
    network_mode: host
    environment:
      DATABASE_URL: postgresql+psycopg://monai:monai@localhost:5434/monai
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_MODEL: gemma4:31b-cloud
      OLLAMA_EMBED_MODEL: gemma4:31b-cloud
      MONAI_API_KEY: ${MONAI_API_KEY:?MONAI_API_KEY must be set - add it to .env}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: monai-frontend
    network_mode: host
    environment:
      # Next.js route handler at ui/app/api/[...proxy]/route.ts proxies /api/* to
      # the backend and injects MONAI_API_KEY server-side (key never in the JS bundle).
      MONAI_API: http://localhost:8001
      MONAI_API_KEY: ${MONAI_API_KEY:?MONAI_API_KEY must be set - add it to .env}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  monai_pgdata:
